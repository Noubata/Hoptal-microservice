server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:

        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/**

        - id: doctor-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/docteurs/**

        - id: patient-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/patients/**

        - id: laboratory-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/laboratoire/**

        - id: result-labo-service
          uri: http://localhost:8086
          predicates:
            - Path=/api/resultats/**

        - id: medical-record-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/releves/**

        - id: prescription-service
          uri: http://localhost:8087
          predicates:
            - Path=/api/prescriptions/**

