spring:
  cloud:
    gateway:
      routes:

        - id: auth-service
          uri: http://auth-service:8081
          predicates:
            - Path=/api/auth/**

        - id: doctor-service
          uri: http://doctor-service:8082
          predicates:
            - Path=/api/docteurs/**

        - id: patient-service
          uri: http://patient-service:8084
          predicates:
            - Path=/api/patients/**

        - id: laboratory-service
          uri: http://laboratory-service:8083
          predicates:
            - Path=/api/laboratoire/**

        - id: result-labo-service
          uri: http://result-labo-service:8086
          predicates:
            - Path=/api/resultats/**

        - id: medical-record-service
          uri: http://medical-record-service:8085
          predicates:
            - Path=/api/releves/**

        - id: prescription-service
          uri: http://prescription-service:8087
          predicates:
            - Path=/api/prescriptions/**