#Key technical decisions and preferences (HOPTAL project)
#
#Architecture: Monorepo microservices (single Git repo, all services); layered architecture retained within each service
#Stack: Java + Spring Boot; PostgreSQL per service with separate databases via init.sql; Docker + docker-compose for all services (no services removed)
#Modules established: auth, doctor, laboratory, medical-record, patient, prescription, result-labo, plus a shared common module
#Dev workflow: Spring profiles (application-local.yml / application-docker.yml) to avoid switching DB connection strings; localhost configs avoided from the start
#Code style: Java records for DTOs, @Slf4j for logging
#Diagramming: Preference for draw.io and mermaid.live; recommendation to diagram each service individually before coding
